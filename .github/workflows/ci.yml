# display name
name : Heart murmur CI

# When to deploy, CI
on:
  push:
    branches:
      - main

# Where to deploy
jobs:
  build:
    runs-on: ubuntu-latest # Fastest virtual env

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4  # clones the rep in empty vm

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |       # terminal in ubuntu
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Docker image
      run: |
        docker build -t heartbeat-api .

    - name: Run Docker container
      run: |
        docker run -d -p 8000:8000 --name heartbeat heartbeat-api

    - name: Wait for API
      run: sleep 10  

    - name: Health Check
      run: |
        curl http://localhost:8000/




