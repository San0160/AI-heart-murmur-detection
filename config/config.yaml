# Template for dataset path

artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_injection
  source_URL: https://huggingface.co/datasets/San0160/Heart-murmur/resolve/main/Heartbeat_Sound.zip  
  local_data_file: artifacts/data_injection/data.zip
  unzip_dir: artifacts/data_injection

data_validation:
  root_dir: artifacts/data_validation
  STATUS_FILE: artifacts/data_validation/status.txt
  ALL_REQUIRED_FILES: ["artifact", "extrahls", "extrastole", "murmur", "normal", "unlabel"]

data_processing:
  root_dir: artifacts/data_preprocessing
  local_data_file: artifacts/data_preprocessing/processed_data/

data_transformation:
  root_dir: artifacts/data_transformation
  local_data_file: artifacts/data_transformation/transformed_data/
  preprocessed_data_path: artifacts/data_preprocessing/processed_data/


model_trainer:
  root_dir: artifacts/model_training
  transformed_data_path: artifacts/data_transformation
  trained_model_path: artifacts/model_training/heart_murmur_model.pth

  # Model
  input_size: 1
  hidden_size: 64
  num_layers: 1
  num_classes: 3
  dropout: 0.5

  # Training
  batch_size: 32
  learning_rate: 0.001
  epochs: 100
  patience: 15

model_evaluation:
  root_dir: artifacts/model_evaluation

  # Inputs
  transformed_data_path: artifacts/data_transformation
  trained_model_path: artifacts/model_training/heart_murmur_model.pth

  # Outputs
  metrics_path: artifacts/model_evaluation/metrics.csv
  confusion_matrix_path: artifacts/model_evaluation/confusion_matrix.png

  # Evaluation
  batch_size: 32

  # Model Architecture
  input_size: 1
  hidden_size: 64
  num_layers: 1
  num_classes: 3
  dropout: 0.5

  # Class Names
  classes:
    - artifact
    - murmur
    - normal

prediction:
  root_dir: artifacts/prediction
  trained_model_path: artifacts/model_training/heart_murmur_model.pth

  repo_id: San0160/Heart-murmur-classifier
  filename: heart_murmur_model.pth

  input_size: 1
  hidden_size: 64
  num_layers: 1
  num_classes: 3
  dropout: 0.5

  classes:
    - artifact
    - murmur
    - normal